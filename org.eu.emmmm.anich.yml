app-id: org.eu.emmmm.anich
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: /app/anich
finish-args:
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.ScreenSaver
  - --persist=anich_data
modules:
  - name: anich
    buildsystem: simple
    build-commands:
      - ar x anich.deb
      - tar -I zstd -xf data.tar.zst
      - install -Dm755 usr/share/anich/anich ${FLATPAK_DEST}/anich
      - mkdir -p ${FLATPAK_DEST}/lib
      - install -m644 usr/share/anich/lib/*.so* ${FLATPAK_DEST}/lib/
      - mkdir -p ${FLATPAK_DEST}/data
      - cp -r usr/share/anich/data/flutter_assets ${FLATPAK_DEST}/data/
      - install -m644 usr/share/anich/data/icudtl.dat ${FLATPAK_DEST}/data/
      - install -Dm644 org.eu.emmmm.anich.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/org.eu.emmmm.anich.png
      - install -Dm644 org.eu.emmmm.anich.desktop ${FLATPAK_DEST}/share/applications/org.eu.emmmm.anich.desktop
      - install -Dm644 org.eu.emmmm.anich.metainfo.xml ${FLATPAK_DEST}/share/metainfo/org.eu.emmmm.anich.metainfo.xml
    sources:
      - type: file
        url: https://github.com/Sle2p/AniCh/releases/download/1.5.8/anich-linux-1.5.8.deb
        sha256: 1bea1160f1f0bed623ebd84ab2464ad3645d26917fb9d0a029990f91228b1859
        dest-filename: anich.deb
      - type: file
        path: org.eu.emmmm.anich.png
      - type: file
        path: org.eu.emmmm.anich.desktop
      - type: file
        path: org.eu.emmmm.anich.metainfo.xml
