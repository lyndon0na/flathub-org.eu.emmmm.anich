name: Build Flatpak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK
        run: |
          flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --force-clean build-dir org.eu.emmmm.anich.yml

      - name: Create bundle
        run: |
          flatpak build-bundle repo anich.flatpak org.eu.emmmm.anich

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anich-flatpak
          path: anich.flatpak

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: anich-flatpak

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Anich ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Anich Flatpak 包
            
            基于 Anich ${{ steps.get_version.outputs.VERSION }} 版本构建。
            
            ### 安装方法
            ```bash
            flatpak install --user anich.flatpak
            ```
            
            ### 运行
            ```bash
            flatpak run org.eu.emmmm.anich
            ```
          files: anich.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}